<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nilrikssons Reseguide</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --gold: #B5813A; --gold-light: #E8D5B0; --cream: #FAF7F2; --dark: #1C1612; --mid: #6B5B4E; --border: rgba(181,129,58,0.18); }
  html, body { height: 100%; overflow: hidden; font-family: "Lato", sans-serif; background: var(--cream); color: var(--dark); -webkit-tap-highlight-color: transparent; user-select: none; }
  .page { position: fixed; inset: 0; display: flex; flex-direction: column; background: var(--cream); transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s ease; }
  .page.hidden-left  { transform: translateX(-100%); opacity: 0; pointer-events: none; }
  .page.hidden-right { transform: translateX(100%);  opacity: 0; pointer-events: none; }

  /* START */
  .start-page { justify-content: center; align-items: center; padding: 2rem 1.5rem; }
  .start-brand { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.6rem; text-align: center; }
  .start-title { font-family: "Playfair Display", serif; font-size: 30px; font-weight: 600; color: var(--dark); text-align: center; line-height: 1.15; margin-bottom: 0.5rem; }
  .start-sub { font-size: 12px; color: var(--mid); font-weight: 300; text-align: center; letter-spacing: 0.05em; margin-bottom: 2rem; }
  .start-divider { width: 40px; height: 1px; background: var(--gold); margin: 0 auto 2rem; }
  .city-cards { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 340px; }
  .city-card { display: flex; align-items: center; gap: 1rem; background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 1.1rem 1.3rem; cursor: pointer; text-align: left; width: 100%; transition: border-color 0.15s; }
  .city-card:active { border-color: var(--gold); }
  .city-icon { font-size: 34px; flex-shrink: 0; }
  .city-card-name { font-family: "Playfair Display", serif; font-size: 20px; font-weight: 600; color: var(--dark); margin-bottom: 3px; }
  .city-card-sub { font-size: 11.5px; color: var(--mid); font-weight: 300; }
  .city-arrow { color: var(--gold-light); font-size: 22px; flex-shrink: 0; margin-left: auto; }

  /* INDEX */
  .index-header { flex-shrink: 0; padding: 1rem 1.4rem 0.9rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.9rem; }
  .index-back { background: none; border: none; color: var(--gold); font-size: 20px; cursor: pointer; padding: 0; line-height: 1; flex-shrink: 0; }
  .index-header-brand { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--mid); margin-bottom: 2px; }
  .index-header-city { font-family: "Playfair Display", serif; font-size: 26px; font-weight: 600; color: var(--dark); line-height: 1; }
  .index-map-bar { padding: 0.7rem 1.4rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .index-map-label { font-size: 11.5px; color: var(--mid); font-weight: 300; }
  .index-map-btn { display: inline-flex; align-items: center; gap: 5px; background: var(--dark); border: none; border-radius: 8px; padding: 7px 14px; color: var(--gold-light); font-family: "Lato", sans-serif; font-size: 11.5px; cursor: pointer; letter-spacing: 0.04em; text-decoration: none; }
  .index-map-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
  .index-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2rem; }
  .index-list::-webkit-scrollbar { display: none; }
  .index-item { display: flex; align-items: center; gap: 1rem; padding: 0.85rem 1.4rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; }
  .index-item:active { background: rgba(181,129,58,0.06); }
  .index-thumb { width: 56px; height: 56px; border-radius: 8px; overflow: hidden; flex-shrink: 0; background: #EDE5DA; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .index-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .index-item-body { flex: 1; min-width: 0; }
  .index-item-num { font-size: 10px; letter-spacing: 0.16em; color: var(--gold); font-weight: 700; text-transform: uppercase; margin-bottom: 1px; }
  .index-item-title { font-family: "Playfair Display", serif; font-size: 15px; font-weight: 600; line-height: 1.25; color: var(--dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .index-item-hint { font-size: 11.5px; color: var(--mid); font-weight: 300; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .index-arrow { color: var(--gold-light); font-size: 20px; flex-shrink: 0; }

  /* DETAIL */
  .detail-top-bar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem 0.6rem; flex-shrink: 0; border-bottom: 1px solid var(--border); }
  .back-btn { background: none; border: none; font-family: "Lato", sans-serif; font-size: 13px; color: var(--gold); cursor: pointer; padding: 4px 0; letter-spacing: 0.03em; display: flex; align-items: center; gap: 5px; }
  .dots-wrap { display: flex; gap: 5px; align-items: center; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold-light); transition: background 0.3s, transform 0.3s; flex-shrink: 0; }
  .dot.active { background: var(--gold); transform: scale(1.35); }
  .slider-outer { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .slider-track { display: flex; width: 100%; height: 100%; transition: transform 0.38s cubic-bezier(0.4,0,0.2,1); will-change: transform; }
  .slider-track.no-transition { transition: none; }
  .slide { min-width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
  .slide-img-wrap { position: relative; width: 100%; height: 36vh; flex-shrink: 0; overflow: hidden; background: #C8B89A; display: flex; align-items: center; justify-content: center; }
  .slide-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .slide-emoji { font-size: 64px; }
  .num-badge { position: absolute; bottom: 12px; left: 14px; background: var(--dark); color: var(--gold); font-size: 10px; letter-spacing: 0.12em; font-weight: 700; padding: 4px 10px; border-radius: 4px; }
  .slide-content { flex: 1; overflow-y: auto; padding: 1.1rem 1.4rem 2rem; -webkit-overflow-scrolling: touch; }
  .slide-content::-webkit-scrollbar { display: none; }
  .slide-title { font-family: "Playfair Display", serif; font-size: clamp(19px, 5vw, 24px); font-weight: 600; line-height: 1.15; color: var(--dark); margin-bottom: 0.45rem; }
  .slide-hint { font-size: 11px; color: var(--gold); font-weight: 400; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .slide-text { font-size: 15px; line-height: 1.82; color: var(--mid); font-weight: 300; }
  .map-btn-wrap { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .map-btn { display: inline-flex; align-items: center; gap: 6px; background: none; border: 1px solid var(--gold); border-radius: 8px; padding: 9px 16px; color: var(--gold); font-family: "Lato", sans-serif; font-size: 13px; cursor: pointer; letter-spacing: 0.04em; text-decoration: none; }
  .map-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
  .bottom-nav { flex-shrink: 0; background: var(--cream); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1.4rem; padding-bottom: calc(0.75rem + env(safe-area-inset-bottom)); }
  .nav-btn { background: var(--dark); border: none; border-radius: 8px; padding: 9px 18px; color: var(--gold-light); font-family: "Lato", sans-serif; font-size: 13px; cursor: pointer; letter-spacing: 0.05em; min-width: 85px; text-align: center; }
  .nav-btn:active { opacity: 0.7; }
  .nav-btn:disabled { opacity: 0.2; pointer-events: none; }
  .nav-counter { text-align: center; }
  .nav-count-num { font-family: "Playfair Display", serif; font-size: 17px; color: var(--dark); line-height: 1; }
  .nav-count-label { font-size: 10px; color: var(--mid); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }
  .swipe-hint { position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%); background: rgba(28,22,18,0.07); border: 1px solid var(--border); color: var(--mid); font-size: 12px; padding: 6px 16px; border-radius: 20px; letter-spacing: 0.08em; pointer-events: none; white-space: nowrap; z-index: 500; transition: opacity 0.6s; }
  .swipe-hint.hidden { opacity: 0; }
</style>
</head>
<body>

<!-- START -->
<div class="page start-page" id="start-page">
  <div class="start-brand">Nilrikssons reseguide</div>
  <h1 class="start-title">Välj destination</h1>
  <p class="start-sub">Italien 2025</p>
  <div class="start-divider"></div>
  <div class="city-cards">
    <button class="city-card" id="btn-bologna">
      <span class="city-icon">🏛️</span>
      <div>
        <div class="city-card-name">Bologna</div>
        <div class="city-card-sub">11 sevärdheter &nbsp;·&nbsp; La Dotta</div>
      </div>
      <span class="city-arrow">›</span>
    </button>
    <button class="city-card" id="btn-rome">
      <span class="city-icon">🏟️</span>
      <div>
        <div class="city-card-name">Rom</div>
        <div class="city-card-sub">11 sevärdheter &nbsp;·&nbsp; Dagsutflykt</div>
      </div>
      <span class="city-arrow">›</span>
    </button>
  </div>
</div>

<!-- INDEX -->
<div class="page hidden-right" id="index-page">
  <div class="index-header">
    <button class="index-back" id="index-back-btn">&#8592;</button>
    <div>
      <div class="index-header-brand">Nilrikssons reseguide</div>
      <div class="index-header-city" id="index-city-name">Bologna</div>
    </div>
  </div>
  <div class="index-map-bar">
    <span class="index-map-label">Se alla platser på kartan</span>
    <a class="index-map-btn" id="index-map-link" href="#" target="_blank">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      Översiktskarta
    </a>
  </div>
  <div class="index-list" id="index-list"></div>
</div>

<!-- DETAIL -->
<div class="page hidden-right" id="detail-page">
  <div class="detail-top-bar">
    <button class="back-btn" id="back-btn">&#8592; Alla sevärdheter</button>
    <div class="dots-wrap" id="dots-wrap"></div>
  </div>
  <div class="slider-outer">
    <div class="slider-track" id="track"></div>
  </div>
  <div class="bottom-nav">
    <button class="nav-btn" id="prev-btn">&#8592; Bakåt</button>
    <div class="nav-counter">
      <div class="nav-count-num" id="counter">1 / 11</div>
      <div class="nav-count-label">Sevärdheter</div>
    </div>
    <button class="nav-btn" id="next-btn">Nästa &#8594;</button>
  </div>
</div>

<div class="swipe-hint hidden" id="swipe-hint">Swipa för att bläddra</div>

var romeCityData = {
  name: "Rom",
  mapUrl: "https://maps.google.com/?q=Rome,Italy",
  places: [{"num": "01", "title": "Colosseum", "hint": "Antikens ingenjörskonst – 50 000 till 80 000 åskådare", "emoji": "🏟️", "gmaps": "https://maps.google.com/?q=Colosseum,Rome,Italy", "text": "När du kliver ut från tunnelbanan står du öga mot öga med antikens ingenjörskonst. Bygget påbörjades av kejsar Vespasianus år 72 e.Kr. och slutfördes av hans son Titus år 80 e.Kr. Namnet Colosseum kommer egentligen från en enorm staty av Nero, Kolossen, som en gång stod intill. Amfiteatern rymde mellan 50 000 och 80 000 åskådare. Under 2026 kan man tydligt se resultatet av de senaste årens varsamma rengöring – den vita travertinmarmorn lyser återigen, precis som den gjorde under romartiden. Den nya utsiktsplattformen vid tunnelbanans utgång ger dig en perfekt vinkel för att fotografera de bärande valven utan att trängas med massorna nere på marknivå."}, {"num": "02", "title": "Konstantins båge & Venus och Roms tempel", "hint": "Triumfbåge från 315 e.Kr. och Hadrianus tempel", "emoji": "🏛️", "gmaps": "https://maps.google.com/?q=Arch+of+Constantine,Rome,Italy", "text": "Precis söder om arenan står en av världens mest kända triumfbågar, rest år 315 e.Kr. för att fira Konstantins seger över Maxentius. Intill ligger ruinerna av Venus och Roms tempel, ritat av kejsar Hadrianus. I romersk mytologi var Venus gudinnan för kärlek, skönhet och fruktbarhet – och dessutom den gudinna som kejsarna ofta hävdade släktskap med via Aeneas, vilket förklarar templets enorma skala. Templet hade två huvudrum placerade rygg mot rygg – ett dedikerat till Venus och ett till Roma. Lägg märke till att Roma baklänges blir Amor."}, {"num": "03", "title": "Via dei Fori Imperiali", "hint": "Kejsarforumen och världens första köpcentrum", "emoji": "🏺", "gmaps": "https://maps.google.com/?q=Via+dei+Fori+Imperiali,Rome,Italy", "text": "När Rom växte räckte det gamla Forum Romanum inte till. Därför byggde kejsarna egna torg – monument över sig själva. Här ser du bland annat Trajanus marknad, som ofta kallas världens första köpcentrum med över 150 butiker och kontor i flera våningar. Gatan du går på anlades under 1930-talet, och under asfalten ligger fortfarande stora delar av det antika Rom som ännu inte grävts ut helt."}, {"num": "04", "title": "Capitolium – Campidoglio", "hint": "Antika Roms religiösa hjärta med Michelangelos trappa", "emoji": "⛪", "gmaps": "https://maps.google.com/?q=Piazza+del+Campidoglio,Rome,Italy", "text": "Detta var det antika Roms religiösa hjärta. När du går upp för den breda trappan Cordonata, ritad av Michelangelo, möts du av Marcus Aurelius ryttarstaty på torget (originalet står inne i museet intill). Gå inte direkt ner igen! Runda senatorpalatset till höger och gå till Via Monte Tarpeo. Härifrån ser du ner över hela Forum Romanum. Under 2026 är detta fortfarande den främsta platsen för att förstå stadens geografi, med ruinerna nedanför och Colosseum i horisonten."}, {"num": "05", "title": "Piazza Venezia & Vittoriano", "hint": "Det moderna Italiens monument – folkmun kallar det skrivmaskinen", "emoji": "🕊️", "gmaps": "https://maps.google.com/?q=Vittoriano,Rome,Italy", "text": "Här möts antikens historia och det moderna Italiens enande. Det enorma vita monumentet Vittoriano kallas i folkmun för skrivmaskinen eller bröllopstårtan på grund av sin form och bländvita färg. Besök den Okände soldatens grav som vaktas dygnet runt. Om du vill ha en paus, ta glashissen på baksidan upp till taket, Terrazza delle Quadrighe. Vyn över Roms kupoler är oslagbar, och man kan se ända till havet vid klart väder."}, {"num": "06", "title": "Fontana di Trevi", "hint": "Barockpärla och slutet på en antik akvedukt", "emoji": "⛲", "gmaps": "https://maps.google.com/?q=Trevi+Fountain,Rome,Italy", "text": "Efter att ha gått genom smala gränder öppnar sig plötsligt torget med denna barockpärla. Fontänen är egentligen slutet på en antik akvedukt, Aqua Virgo, som fortfarande levererar vatten till stadens centrum. Havsguden Neptunus står i mitten, flankerad av två tritoner som tämjer sjöhästar – en vild och en lugn, vilket symboliserar havets olika humör. Att kasta ett mynt över axeln är inte bara en myt – det samlas in ca 1,5 miljoner euro årligen från fontänen som skänks till behövande."}, {"num": "07", "title": "Spanska trappan", "hint": "135 trappsteg som förenar spanskt och franskt", "emoji": "🪜", "gmaps": "https://maps.google.com/?q=Spanish+Steps,Rome,Italy", "text": "Trappan byggdes för att binda samman den spanska ambassaden vid foten med den franska kyrkan Trinita dei Monti på toppen. Vid foten ligger Berninis fontän Barcaccia, den fula båten, som sägs vara inspirerad av en båt som spolades upp här under en översvämning på 1500-talet. Med tunnelbanestationen Spagna eventuellt stängd för modernisering 2026, rekommenderas att ta Via del Babuino för en flanörvänlig väg mot nästa mål."}, {"num": "08", "title": "Hadrianustemplet – Hadrianum", "hint": "11 korintiska kolonner inbyggda i en modern fasad", "emoji": "🏛️", "gmaps": "https://maps.google.com/?q=Tempio+di+Adriano,Rome,Italy", "text": "Vid Piazza di Pietra ser du 11 korintiska kolonner inbyggda i en modern fasad. Detta är ett typexempel på Roms återvinning. Korintisk stil kommer från den grekiska staden Korint och kännetecknas av att kolonnernas kapitäl, överdelen, ser ut som en korg fylld med blad från akantusväxten. Det var den mest påkostade och populära stilen under romerska kejsartiden eftersom den utstrålade extrem lyx."}, {"num": "09", "title": "Pantheon", "hint": "Världens största oarmerade betongkupol sedan 125 e.Kr.", "emoji": "🔵", "gmaps": "https://maps.google.com/?q=Pantheon,Rome,Italy", "text": "Detta är arkitektoniskt sett en av världens mest inflytelserika byggnader. Den nuvarande byggnaden uppfördes av Hadrianus kring 125 e.Kr. Den enorma kupolen har ett hål i mitten, en oculus, som är den enda ljuskällan. Kupolen är gjord av betong som blir lättare ju högre upp man kommer, genom att blanda i pimpsten. Det är fortfarande världens största oarmerade betongku var activeCity = null;
var current = 0;
var dots = [];

var startPage  = document.getElementById("start-page");
var indexPage  = document.getElementById("index-page");
var detailPage = document.getElementById("detail-page");
var indexList  = document.getElementById("index-list");
var track      = document.getElementById("track");
var dotsWrap   = document.getElementById("dots-wrap");
var prevBtn    = document.getElementById("prev-btn");
var nextBtn    = document.getElementById("next-btn");
var counter    = document.getElementById("counter");
var backBtn    = document.getElementById("back-btn");
var swipeHint  = document.getElementById("swipe-hint");
var indexCityName = document.getElementById("index-city-name");
var indexMapLink  = document.getElementById("index-map-link");

document.getElementById("btn-bologna").addEventListener("click", function() { openCity(bolognaCityData); });
document.getElementById("btn-rome").addEventListener("click", function() { openCity(romeCityData); });
document.getElementById("index-back-btn").addEventListener("click", goToStart);
backBtn.addEventListener("click", function() {
  detailPage.classList.add("hidden-right");
  indexPage.classList.remove("hidden-left");
});
prevBtn.addEventListener("click", function() { goTo(current - 1); });
nextBtn.addEventListener("click", function() { goTo(current + 1); });

function openCity(city) {
  activeCity = city;
  indexCityName.textContent = city.name;
  indexMapLink.href = city.mapUrl;
  buildIndex();
  buildSlides();
  startPage.classList.add("hidden-left");
  indexPage.classList.remove("hidden-right");
}

function goToStart() {
  indexPage.classList.add("hidden-right");
  detailPage.classList.add("hidden-right");
  startPage.classList.remove("hidden-left");
}

function buildIndex() {
  indexList.innerHTML = "";
  activeCity.places.forEach(function(p, i) {
    var item = document.createElement("div");
    item.className = "index-item";
    var thumbContent = p.img
      ? '<img src="' + p.img + '" alt="" />'
      : p.emoji;
    item.innerHTML =
      '<div class="index-thumb">' + thumbContent + '</div>' +
      '<div class="index-item-body">' +
        '<div class="index-item-num">Sevärdhet ' + p.num + '</div>' +
        '<div class="index-item-title">' + p.title + '</div>' +
        '<div class="index-item-hint">' + p.hint + '</div>' +
      '</div>' +
      '<div class="index-arrow">›</div>';
    item.addEventListener("click", (function(idx) { return function() { openDetail(idx); }; })(i));
    indexList.appendChild(item);
  });
}

function buildSlides() {
  track.innerHTML = "";
  dotsWrap.innerHTML = "";
  dots = [];
  var total = activeCity.places.length;
  activeCity.places.forEach(function(p, i) {
    var slide = document.createElement("div");
    slide.className = "slide";
    var imgContent = p.img
      ? '<img src="' + p.img + '" alt="' + p.title + '" />'
      : '<span class="slide-emoji">' + p.emoji + '</span>';
    slide.innerHTML =
      '<div class="slide-img-wrap">' +
        imgContent +
        '<div class="num-badge">' + p.num + ' / ' + total + '</div>' +
      '</div>' +
      '<div class="slide-content">' +
        '<h2 class="slide-title">' + p.title + '</h2>' +
        '<div class="slide-hint">' + p.hint + '</div>' +
        '<p class="slide-text">' + p.text + '</p>' +
        '<div class="map-btn-wrap">' +
          '<a class="map-btn" href="' + p.gmaps + '" target="_blank">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' +
            'Hitta hit' +
          '</a>' +
        '</div>' +
      '</div>';
    track.appendChild(slide);
    var dot = document.createElement("div");
    dot.className = "dot";
    dotsWrap.appendChild(dot);
    dots.push(dot);
  });
}

function goTo(idx, animate) {
  if (animate === undefined) animate = true;
  if (idx < 0 || idx >= activeCity.places.length) return;
  current = idx;
  if (!animate) track.classList.add("no-transition");
  track.style.transform = "translateX(-" + (current * 100) + "%)";
  if (!animate) { requestAnimationFrame(function() { requestAnimationFrame(function() { track.classList.remove("no-transition"); }); }); }
  dots.forEach(function(d, i) { d.classList.toggle("active", i === current); });
  counter.textContent = (current + 1) + " / " + activeCity.places.length;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === activeCity.places.length - 1;
  track.querySelectorAll(".slide-content").forEach(function(c, i) { if (i === current) c.scrollTop = 0; });
}

function openDetail(idx) {
  goTo(idx, false);
  indexPage.classList.add("hidden-left");
  detailPage.classList.remove("hidden-right");
  swipeHint.classList.remove("hidden");
  setTimeout(function() { swipeHint.classList.add("hidden"); }, 2500);
}

document.addEventListener("keydown", function(e) {
  if (detailPage.classList.contains("hidden-right")) return;
  if (e.key === "ArrowRight") goTo(current + 1);
  if (e.key === "ArrowLeft")  goTo(current - 1);
  if (e.key === "Escape") backBtn.click();
});

var touchStartX = 0, touchStartY = 0, touchCurrentX = 0, dragging = false, lockedAxis = null;
track.addEventListener("touchstart", function(e) {
  touchStartX = touchCurrentX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  dragging = true; lockedAxis = null;
  track.classList.add("no-transition");
}, { passive: true });
track.addEventListener("touchmove", function(e) {
  if (!dragging) return;
  var dx = e.touches[0].clientX - touchStartX;
  var dy = e.touches[0].clientY - touchStartY;
  if (!lockedAxis) lockedAxis = Math.abs(dx) > Math.abs(dy) ? "x" : "y";
  if (lockedAxis === "x") {
    e.preventDefault();
    touchCurrentX = e.touches[0].clientX;
    track.style.transform = "translateX(" + (-(current * window.innerWidth) + (touchCurrentX - touchStartX)) + "px)";
  }
}, { passive: false });
track.addEventListener("touchend", function() {
  if (!dragging) return;
  dragging = false;
  track.classList.remove("no-transition");
  if (lockedAxis === "x") {
    var diff = touchCurrentX - touchStartX;
    if (diff < -60 && current < activeCity.places.length - 1) goTo(current + 1);
    else if (diff > 60 && current > 0) goTo(current - 1);
    else goTo(current);
  } else { goTo(current, false); }
  lockedAxis = null;
}, { passive: true });
</script>
</body>
</html>
